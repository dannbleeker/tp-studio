name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Session 101 — opt into Node 24 for JavaScript actions.
#
# Every CI run was printing this deprecation warning:
#   "Node.js 20 actions are deprecated. The following actions are
#    running on Node.js 20 and may not work as expected:
#    actions/checkout@v4, actions/setup-node@v4,
#    actions/upload-artifact@v4, pnpm/action-setup@v4. Actions will
#    be forced to run with Node.js 24 by default starting June 2nd,
#    2026."
#
# `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true` is GitHub's documented
# opt-in for the June-2026 forced-default. Setting it at workflow
# level (here, not per-step) means every JS action in every job
# inherits the flag — and the same set of actions runs against the
# Node-24 runtime that will be mandatory anyway, so any breakage
# surfaces now rather than at the forced-cutover date. The
# v4-versioned actions all work on Node 24 in practice; the env var
# just suppresses the warning + future-tests the migration.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Session 85 — split the previous monolithic `check` job into three
# parallel jobs so the fast feedback (lint + types in ~10s) surfaces
# before contributors wait for the slow steps. Each job re-runs install
# but the pnpm cache makes that ~5s after the first job warms it. The
# trade is a small duplication of setup time for much faster signal on
# the most-common kinds of failure (lint regressions, type errors).

jobs:
  lint-types:
    name: Lint + types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # No `version:` — `pnpm/action-setup@v4` reads `packageManager` from
        # package.json. Keeps the CI version in lockstep with developers.
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm exec tsc --noEmit

  tests-build:
    name: Tests + build + bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage report
        # Coverage isn't gated on a third-party service yet; this just
        # makes the html/json reports inspectable from the run artifacts
        # so a coverage drop is visible in PRs.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: pnpm build

      - name: Bundle-size budget
        # Reads dist/assets/*.js and fails the build if any chunk exceeds
        # its bundle-budget.json ceiling by >10%. Catches accidental
        # dependency bloat before it lands on main.
        run: pnpm check:bundle-size

  e2e:
    name: Playwright e2e smoke tests
    runs-on: ubuntu-latest
    # Runs in parallel with lint-types and tests-build. The slow
    # browser-binary install + headless test run is the longest CI step;
    # keeping it on its own runner so failures here don't block the
    # fast-feedback jobs from finishing.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # `--with-deps` adds the apt packages Playwright needs (libnss3,
        # libxss1, etc.) on the GitHub runner.
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
