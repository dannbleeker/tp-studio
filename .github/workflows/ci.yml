name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + types + tests + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # No `version:` — `pnpm/action-setup@v4` reads `packageManager` from
        # package.json (currently `pnpm@11.0.9`). Pinning a different version
        # here would silently use a different pnpm than developers run
        # locally and could re-resolve the lockfile.
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        # `tsc -b --noEmit` walks the project references (tsconfig.json +
        # tsconfig.node.json). The previous `tsc --noEmit` only checked the
        # root project, which is weaker than what `pnpm build` runs locally.
        run: pnpm exec tsc -b --noEmit

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage report
        # Coverage isn't gated on a third-party service yet; this just
        # makes the html/json reports inspectable from the run artifacts
        # so a coverage drop is visible in PRs.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: pnpm build

      - name: Bundle-size budget
        # Reads dist/assets/*.js and fails the build if any chunk exceeds
        # its bundle-budget.json ceiling by >10%. Catches accidental
        # dependency bloat before it lands on main.
        run: pnpm check:bundle-size

  e2e:
    name: Playwright e2e smoke tests
    runs-on: ubuntu-latest
    # Run e2e in parallel with the main check job. They share a checkout
    # but separate the slow browser-binary install + headless run from
    # the type-check / unit-test path.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        # `--with-deps` adds the apt packages Playwright needs (libnss3,
        # libxss1, etc.) on the GitHub runner.
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
