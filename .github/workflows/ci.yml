name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Session 135 (2026-05-26) — supersedes the Session 101
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env-var hack: every JS action is
# now pinned to a major that runs on Node 24 natively
# (actions/checkout@v6, actions/setup-node@v6, pnpm/action-setup@v6,
# actions/upload-artifact@v7, actions/cache@v5). The env var was a
# workaround for the v4-on-Node-20 deprecation warning; with these
# Node-24 action majors the deprecation is resolved at the source, so the
# flag is no longer necessary and was removed.
#
# Session 153 — bumped the last straggler, actions/cache@v4 → @v5 (its v4
# runtime was still `node20`, which kept the deprecation warning alive on
# the Playwright-cache step below); v5 runs on `node24`.

# Session 85 — split the previous monolithic `check` job into three
# parallel jobs so the fast feedback (lint + types in ~10s) surfaces
# before contributors wait for the slow steps. Each job re-runs install
# but the pnpm cache makes that ~5s after the first job warms it. The
# trade is a small duplication of setup time for much faster signal on
# the most-common kinds of failure (lint regressions, type errors).

jobs:
  lint-types:
    name: Lint + types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        # No `version:` — `pnpm/action-setup` reads `packageManager` from
        # package.json. Keeps the CI version in lockstep with developers.
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Dead-code check (knip)
        # Session 112 — knip surfaces unused files, exports, types,
        # and duplicate exports. Configured via `knip.json`; current
        # baseline is 4 retained exports + 2 retained types
        # (documented at their declaration sites). New unused code
        # added in a PR fails this step.
        run: pnpm knip --no-progress

  tests-build:
    name: Tests + build + bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:coverage

      - name: Upload coverage report
        # Coverage isn't gated on a third-party service yet; this just
        # makes the html/json reports inspectable from the run artifacts
        # so a coverage drop is visible in PRs.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: pnpm build

      - name: Bundle-size budget
        # Reads dist/assets/*.js and fails the build if any chunk exceeds
        # its bundle-budget.json ceiling by >10%. Catches accidental
        # dependency bloat before it lands on main.
        run: pnpm check:bundle-size

  e2e:
    name: Playwright e2e smoke tests
    runs-on: ubuntu-latest
    # Runs in parallel with lint-types and tests-build. The slow
    # browser-binary install + headless test run is the longest CI step;
    # keeping it on its own runner so failures here don't block the
    # fast-feedback jobs from finishing.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        # The Chromium download (~100 MB) is keyed on the lockfile, so it's
        # re-downloaded only when the pinned Playwright version changes. The
        # pnpm cache covers npm deps but not these browser binaries.
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        # `--with-deps` adds the apt packages Playwright needs (libnss3,
        # libxss1, etc.) on the GitHub runner. On a cache hit the browser
        # binaries are already present, so install only the OS-level deps.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec playwright install-deps chromium
          else
            pnpm exec playwright install --with-deps chromium
          fi

      - name: Build
        run: pnpm build

      - name: Run e2e tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
