name: Deploy to GitHub Pages

# Session 89 — auto-deploy TP Studio to GitHub Pages on every push to
# `main`. The job builds the SPA, uploads the `dist/` directory as a
# Pages artifact, and the second job picks it up and ships it to the
# Pages environment. The custom domain (`tp-studio.struktureretsundfornuft.dk`)
# is bound via `public/CNAME` which Vite copies into `dist/` at build
# time. Manual triggering is enabled (`workflow_dispatch`) for quick
# re-deploys without committing.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # The Rebuild-book and Stats workflows commit their regenerated artifacts
  # (PDF/EPUB, stats.json) back to `main` using GITHUB_TOKEN, and GitHub does
  # NOT raise a `push` event for GITHUB_TOKEN pushes — so without this, those
  # refreshed artifacts never reach the live site until the next human push.
  # Re-run Deploy when those workflows finish so prod catches up.
  workflow_run:
    workflows: ['Rebuild book artifacts', 'Stats']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Pages only allows one active deployment at a time. `cancel-in-progress:
# false` means a fast follow-up push waits for the prior deploy rather
# than aborting it — safer for an environment that's serving live
# traffic.
concurrency:
  group: 'pages'
  cancel-in-progress: false

# Session 135 (2026-05-26) — supersedes the Session 101
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 env-var workaround: every JS
# action is now pinned to a major that runs on Node 24 natively. See
# ci.yml for the full rationale.

jobs:
  build:
    name: Build dist
    # On a workflow_run trigger, only deploy if the rebuild/stats run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Always build main's tip. A workflow_run trigger hands us the
        # *triggering* commit, which predates the bot's artifact commit, so pin
        # the ref to main to publish the freshest artifacts.
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up pnpm
        # No `version:` — reads `packageManager` from package.json,
        # keeping CI in lockstep with developers' local pnpm.
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
