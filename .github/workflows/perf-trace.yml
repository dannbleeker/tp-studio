name: Perf trace

# Session 106 — manual perf-trace runner.
#
# `e2e/perf-trace.spec.ts` drives the production build through a
# 100-entity interaction sequence and captures a Chrome DevTools
# Protocol trace via Playwright's CDP session. The local dev box
# can't run the spec because `vite preview` is blocked by AppLocker
# (see CLAUDE.md "Environment quirks"); CI runs it on demand here.
#
# Workflow output:
#   - stdout summary (event count, scripting/layout/paint totals,
#     long-task count, scripting percentiles) printed in the
#     workflow log.
#   - `perf-trace-output/*.json` uploaded as a workflow artifact:
#     the raw `perf-trace-<scenario>.json` (open in chrome://tracing
#     or perfetto.dev for the full flame chart) PLUS a small
#     `perf-trace-<scenario>-summary.json` per scenario consumed by
#     the regression-check step.
#
# Session 132 / Tier 3 #12 — also runs weekly on a cron schedule and
# diffs the captured summary against `perf-baseline.json` at repo
# root. A scenario whose `scripting_percentiles.p95_ms` is more than
# `regressionThresholdPct` worse than its baseline fails the workflow.
# Update the baseline in the same commit that lands a deliberate
# perf change.

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC. The interesting question is "did anything
    # land last week that quietly slowed the canvas?" Weekly cadence
    # answers that without spamming the Actions tab; the regression-
    # check step short-circuits if everything is within threshold.
    - cron: '0 6 * * 1'

# Session 101 — opt into Node 24 for JS actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  perf-trace:
    name: Capture Chrome perf trace
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Capture trace (median of 3 runs)
        # Session 135 — single perf-trace runs swing wildly on the CI
        # runner (one observed `all-actions` p95 8.12 ms; the next on
        # the same commit 3.15 ms). The 25% regression gate then
        # flipped on noise, not on real perf changes. Running the
        # spec 3× and feeding the median to the regression check
        # outvotes single-run outliers without doubling cron time.
        # Each iteration's canonical summary is snapshotted to a
        # numbered file so the artifact upload retains every sample
        # for forensics; the median step below writes the median back
        # to the canonical summary path the regression-checker reads.
        env:
          PERF_TRACE: '1'
        run: |
          for i in 1 2 3; do
            echo "=== perf-trace iteration $i / 3 ==="
            pnpm exec playwright test e2e/perf-trace.spec.ts
            for s in all-actions edit-heavy; do
              cp "perf-trace-output/perf-trace-$s-summary.json" \
                 "perf-trace-output/perf-trace-$s-summary.$i.json"
            done
          done

      - name: Median the per-iteration summaries
        # Reads `perf-trace-<scenario>-summary.{1,2,3}.json`, writes
        # the median back to the canonical `*-summary.json` path the
        # regression-checker consumes. Annotates with `_median_of_n`
        # + `_samples` so a borderline gate trip is debuggable from
        # the workflow log alone (no artifact download needed).
        run: node scripts/median-perf-summaries.mjs

      - name: Check for regression vs perf-baseline.json
        # Session 132 / Tier 3 #12 — compares each scenario's
        # `scripting_percentiles.p95_ms` against the checked-in
        # baseline. Exits non-zero if any p95 regressed beyond
        # `regressionThresholdPct`. Now reads the median-of-3 summary
        # written by the previous step, so single-run noise no longer
        # trips the gate. Runs regardless of whether the trace step
        # exited successfully so we always upload the artifact, but
        # the workflow conclusion reflects the regression check.
        run: node scripts/check-perf-regression.mjs

      - name: Upload trace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-trace
          # Session 106 — `perf-trace-output/` not `playwright-report/`:
          # the HTML reporter wipes its own dir at run start, deleting
          # anything else.
          # Session 108 — glob pattern picks up BOTH the `all-actions`
          # and the `edit-heavy` scenarios that the spec now captures.
          # Session 132 — the per-scenario `*-summary.json` files
          # (used by the regression check) land alongside the raw
          # traces under the same `perf-trace-output/` bucket.
          path: perf-trace-output/*.json
          retention-days: 30
