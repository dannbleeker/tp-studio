name: Rebuild book artifacts

# Session 130 / 135 — keep the book outputs in sync with their inputs
# automatically. Two artifacts:
#
#   docs/guide/Causal-Thinking-with-TP-Studio.pdf
#   docs/guide/Causal-Thinking-with-TP-Studio.epub
#
# Both are derived from the same `docs/guide/*.md` + screenshots /
# diagrams source. The PDF is for desktop / print; the EPUB is the
# reflowable form Send-to-Kindle accepts natively (Session 135 fix —
# the PDF didn't reliably open on Kindle, EPUB does).
#
# Why a workflow rather than a pre-commit hook: the PDF rebuild needs
# Playwright + Chromium (~150 MB binary), takes ~10–20 seconds, and is
# only meaningful when the inputs change. Pushing that work to every
# contributor's machine is friction; running it once per change in CI is
# free. The EPUB build is pure-Node (jszip + marked) and would be fast
# enough for a pre-commit hook, but co-locating with the PDF build
# keeps the two artefacts in sync in one place.
#
# Why commit back to main rather than opening a PR: both artefacts are
# deterministic derivatives of the markdown + screenshots. The actual
# review happened on the inputs. A binary diff isn't human-reviewable
# anyway. Auto-merging keeps the published artifacts tracking the
# source without review-cycle friction.
#
# Loop prevention: this workflow only runs when the triggering commit
# is NOT from `github-actions[bot]`. The bot's auto-commit includes
# `[skip pdf]` in the message as a secondary signal for humans reading
# the log, but the actor check is what guarantees no recursion.

on:
  push:
    branches: [main]
    # Only run when book inputs change. Other commits to main (code,
    # configs, etc.) don't touch the artifacts and shouldn't re-render
    # them. The two build scripts + the shared chapter manifest are
    # also inputs — change one and both outputs should rebuild.
    paths:
      - 'docs/guide/*.md'
      - 'docs/guide/screenshots/**.png'
      - 'docs/guide/diagrams/**'
      - 'scripts/build-book-pdf.mjs'
      - 'scripts/build-book-epub.mjs'
      - 'scripts/lib/bookChapters.mjs'
      - 'scripts/lib/clrMapHtml.mjs'
  workflow_dispatch:
    inputs:
      send_to_kindle:
        description: 'Also email the freshly-built EPUB to the Kindle address (needs the KINDLE_TO / SMTP_* secrets).'
        type: boolean
        default: false

# Session 135 (2026-05-26) — supersedes the FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
# env-var workaround: every JS action pinned to a major that runs on
# Node 24 natively. See ci.yml for the full rationale.

jobs:
  rebuild:
    name: Rebuild PDF + EPUB
    # Loop guard: skip if the bot itself pushed this commit. Pairs with
    # the `[skip pdf]` marker in the bot's commit-message body for human
    # readability, but the actor check is the load-bearing one.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use a personal token would be needed to trigger downstream
          # workflows on the bot-push; the default GITHUB_TOKEN is fine
          # here because CI / Deploy fire from `push` events even when
          # the actor is the bot.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        # The book-PDF script imports `chromium` from `@playwright/test`
        # and uses it as a headless renderer. `--with-deps` installs the
        # apt packages chromium needs on the Ubuntu runner. The EPUB
        # build doesn't need Chromium (pure-Node) but we still install
        # it because `pnpm book` runs both builds.
        run: pnpm exec playwright install --with-deps chromium

      - name: Install qpdf
        # Session 135 — the PDF post-process runs `qpdf --linearize` to
        # produce a fast-first-page-render artifact. qpdf isn't pre-
        # installed on the Ubuntu runner; install via apt. The build
        # script soft-fails when qpdf isn't on PATH (skips
        # linearization with a notice), so this step is strictly an
        # optimization — the PDF builds successfully either way.
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Rebuild PDF + EPUB
        # `pnpm book` runs the EPUB build then the PDF build (EPUB
        # first because it's the faster of the two — fail-fast on
        # markdown errors before paying the Playwright startup cost).
        run: pnpm book

      - name: Commit + push if changed
        # Only commit when at least one of the two artifacts changed.
        # `git diff --quiet` returns 0 (success) when there's no diff,
        # 1 when there is — the OR pattern below stages whichever one
        # changed (or both) and skips the commit when neither did.
        #
        # Session 132 — pass the triggering commit's subject (first line
        # only) via env var instead of interpolating `${{ ... }}` directly
        # into the shell command. Direct interpolation broke on any
        # commit message containing backticks: bash parsed the backticks
        # as command substitution and tried to execute the quoted text.
        # The env-var route hands the value to bash as a normal string.
        # We deliberately use only the FIRST LINE so the auto-commit log
        # stays scannable and we don't re-paste a full multi-paragraph
        # body that already lives one commit up.
        env:
          TRIGGER_SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          PDF=docs/guide/Causal-Thinking-with-TP-Studio.pdf
          EPUB=docs/guide/Causal-Thinking-with-TP-Studio.epub
          PDF_CHANGED=0
          EPUB_CHANGED=0
          if ! git diff --quiet "$PDF"; then PDF_CHANGED=1; fi
          if ! git diff --quiet "$EPUB"; then EPUB_CHANGED=1; fi
          if [ "$PDF_CHANGED" = "0" ] && [ "$EPUB_CHANGED" = "0" ]; then
            echo "Both artifacts unchanged — nothing to commit."
            exit 0
          fi
          TRIGGER_FIRST_LINE="$(printf '%s' "${TRIGGER_SUBJECT}" | head -n 1)"
          if [ "$PDF_CHANGED" = "1" ]; then git add "$PDF"; fi
          if [ "$EPUB_CHANGED" = "1" ]; then git add "$EPUB"; fi
          # Build the artifact-list for the commit body so it's clear
          # which one(s) actually changed in this rebuild.
          ARTIFACT_LIST=""
          if [ "$PDF_CHANGED" = "1" ]; then ARTIFACT_LIST="PDF"; fi
          if [ "$EPUB_CHANGED" = "1" ]; then
            if [ -n "$ARTIFACT_LIST" ]; then
              ARTIFACT_LIST="$ARTIFACT_LIST + EPUB"
            else
              ARTIFACT_LIST="EPUB"
            fi
          fi
          git commit -m "docs: rebuild book ($ARTIFACT_LIST) [skip pdf]" \
            -m "Auto-generated by the Rebuild book artifacts workflow in response to changes under docs/guide/ or scripts/build-book-*.mjs. The [skip pdf] marker is informational — the loop guard is the workflow's actor check." \
            -m "Triggered by: ${TRIGGER_FIRST_LINE}"
          git push origin main

      # Session 151 — opt-in Send-to-Kindle. Emails the freshly-built EPUB to a
      # personal-document address when the triggering commit message contains the
      # `[kindle]` flag, OR when a manual run ticks the `send_to_kindle` input.
      #
      # Why opt-in rather than every push: Send-to-Kindle ADDS a new personal
      # document each time — it never replaces/versions — so emailing on every
      # book edit would pile up duplicate copies on the device. The `[kindle]`
      # flag (mirrors the `[skip pdf]` convention) keeps it to "I want a fresh
      # copy now". The attachment is date-stamped so the newest is obvious.
      #
      # Setup (one-time, by the repo owner — see docs/KINDLE_VERIFICATION.md):
      #   - Add an approved sender + find your @kindle.com address in Amazon's
      #     "Manage Your Content & Devices → Personal Document Settings".
      #   - Repo secrets: KINDLE_TO (the @kindle.com address), SMTP_USER and
      #     SMTP_PASS (e.g. a Gmail address + App Password). Optional SMTP_HOST /
      #     SMTP_PORT default to Gmail SSL (smtp.gmail.com:465).
      # Skips silently when KINDLE_TO isn't configured, so the flag is a no-op
      # until you set the secrets up.
      - name: Decide whether to send to Kindle
        id: kindle
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_SEND: ${{ inputs.send_to_kindle }}
          KINDLE_TO: ${{ secrets.KINDLE_TO }}
        run: |
          send=false
          if [ -n "$KINDLE_TO" ]; then
            if printf '%s' "$HEAD_MSG" | grep -qF '[kindle]'; then send=true; fi
            if [ "$DISPATCH_SEND" = "true" ]; then send=true; fi
          fi
          echo "send=$send" >> "$GITHUB_OUTPUT"
          echo "Send to Kindle: $send"

      - name: Stage a date-stamped EPUB
        if: steps.kindle.outputs.send == 'true'
        run: |
          NAME="Causal-Thinking-with-TP-Studio-$(date +%Y-%m-%d).epub"
          cp docs/guide/Causal-Thinking-with-TP-Studio.epub "$NAME"
          echo "KINDLE_EPUB=$NAME" >> "$GITHUB_ENV"

      - name: Email the EPUB to Kindle
        if: steps.kindle.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 465 }}
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          from: TP Studio Book <${{ secrets.SMTP_USER }}>
          to: ${{ secrets.KINDLE_TO }}
          subject: 'Causal Thinking with TP Studio — book update'
          body: |
            The latest build of "Causal Thinking with TP Studio" is attached.
            Sent automatically by the Rebuild book artifacts workflow.
            Commit: ${{ github.sha }}
          attachments: ${{ env.KINDLE_EPUB }}
