name: Rebuild book PDF

# Session 130 — keep `docs/guide/Causal-Thinking-with-TP-Studio.pdf` in
# sync with its inputs (`docs/guide/*.md` + `docs/guide/screenshots/*.png`)
# automatically.
#
# Why a workflow rather than a pre-commit hook: the PDF rebuild needs
# Playwright + Chromium (~150 MB binary), takes ~10–20 seconds, and is
# only meaningful when the inputs change. Pushing that work to every
# contributor's machine is friction; running it once per change in CI is
# free.
#
# Why commit back to main rather than opening a PR: the PDF is a
# deterministic derivative of the markdown + screenshots. The actual
# review happened on the inputs (the manuscript PR that landed the
# markdown change, or the snapshot-refresh PR that landed new PNGs).
# A binary PDF diff isn't human-reviewable anyway. Auto-merging back to
# main keeps the published artifact tracking the source without
# review-cycle friction.
#
# Loop prevention: this workflow only runs when the triggering commit
# is NOT from `github-actions[bot]`. The bot's PDF commit includes
# `[skip pdf]` in the message as a secondary signal for humans reading
# the log, but the actor check is what guarantees no recursion.

on:
  push:
    branches: [main]
    # Only run when book inputs change. Other commits to main (code,
    # configs, etc.) don't touch the PDF and shouldn't re-render it.
    paths:
      - 'docs/guide/*.md'
      - 'docs/guide/screenshots/**.png'
      - 'scripts/build-book-pdf.mjs'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  rebuild:
    name: Rebuild PDF
    # Loop guard: skip if the bot itself pushed this commit. Pairs with
    # the `[skip pdf]` marker in the bot's commit-message body for human
    # readability, but the actor check is the load-bearing one.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a personal token would be needed to trigger downstream
          # workflows on the bot-push; the default GITHUB_TOKEN is fine
          # here because CI / Deploy fire from `push` events even when
          # the actor is the bot.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        # The book-build script imports `chromium` from `@playwright/test`
        # and uses it as a headless renderer. `--with-deps` installs the
        # apt packages chromium needs on the Ubuntu runner.
        run: pnpm exec playwright install --with-deps chromium

      - name: Rebuild PDF
        run: pnpm book

      - name: Commit + push if changed
        # Only commit when the PDF actually changed. `git diff --quiet`
        # returns 0 (success) when there's no diff, 1 when there is —
        # so the `if` block below only fires on real changes.
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet docs/guide/Causal-Thinking-with-TP-Studio.pdf; then
            echo "PDF unchanged — nothing to commit."
            exit 0
          fi
          git add docs/guide/Causal-Thinking-with-TP-Studio.pdf
          git commit -m "docs: rebuild book PDF [skip pdf]

          Auto-generated by the \`Rebuild book PDF\` workflow in response to
          changes under \`docs/guide/\`. The \`[skip pdf]\` marker is
          informational — the loop guard is the workflow's actor check.

          Triggered by: ${{ github.event.head_commit.message }}"
          git push origin main
