name: Stats

# Regenerates public/stats.json (lines of code, coverage, test counts, domain
# richness, git story) after every push to main, then commits it back if it
# changed. The live dashboard reads this file through the GitHub API.

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/stats.json"
  schedule:
    # Weekly refresh (Mon 06:17 UTC) so the dashboard stays current during quiet
    # weeks with no pushes — the git-story + feature-coverage numbers keep moving.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the git story (commits, authors, churn)

      - uses: pnpm/action-setup@v4 # reads the pinned version from package.json#packageManager

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Produce coverage (summary + per-file json) and the Vitest run report
      # (test timing). continue-on-error so a flaky test never blocks the stats
      # refresh — partial coverage / timing is still written.
      - name: Tests with coverage + run report
        continue-on-error: true
        run: pnpm exec vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=json --coverage.reporter=text-summary --reporter=json --outputFile=.tmp/vitest-report.json

      # Production build so the stats script can read dist/ for bundle sizes.
      - name: Build
        run: pnpm build

      # Fail loudly on a malformed feature catalogue rather than letting
      # build-stats emit a null featureCoverage via its safe() guard.
      - name: Validate feature catalogue
        run: node ./scripts/check-feature-coverage.mjs

      - name: Build stats.json
        run: node ./scripts/build-stats.mjs

      - name: Commit refreshed stats
        run: |
          if [[ -n "$(git status --porcelain public/stats.json public/stats-history.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/stats.json public/stats-history.json
            git commit -m "chore(stats): refresh stats [skip ci]"
            # A concurrent workflow (e.g. the book-artifact rebuild) may push to
            # main between our checkout and push. Rebase our stats-only commit on
            # top and retry rather than failing the whole run on a benign race.
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                pushed=true; echo "pushed on attempt $attempt"; break
              fi
              echo "push attempt $attempt rejected; retrying in 5s…"; sleep 5
            done
            if [[ "$pushed" != true ]]; then
              echo "::error::stats push failed after 5 attempts"; exit 1
            fi
          else
            echo "stats unchanged."
          fi
