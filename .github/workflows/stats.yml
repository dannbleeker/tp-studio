name: Stats

# Regenerates public/stats.json (lines of code, coverage, test counts, domain
# richness, git story) after every push to main, then commits it back if it
# changed. The live dashboard reads this file through the GitHub API.

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/stats.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the git story (commits, authors, churn)

      - uses: pnpm/action-setup@v4 # reads the pinned version from package.json#packageManager

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Produce coverage/coverage-summary.json. continue-on-error so a flaky test
      # never blocks the stats refresh — partial coverage is still written.
      - name: Tests with coverage summary
        continue-on-error: true
        run: pnpm exec vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text-summary

      - name: Build stats.json
        run: node ./scripts/build-stats.mjs

      - name: Commit refreshed stats
        run: |
          if [[ -n "$(git status --porcelain public/stats.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/stats.json
            git commit -m "chore(stats): refresh public/stats.json [skip ci]"
            git push
          else
            echo "stats.json unchanged."
          fi
