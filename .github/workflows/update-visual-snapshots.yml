name: Update visual snapshots

# Session 82 — manual baseline-refresh workflow for the Playwright
# visual-regression suite (`e2e/visual-canvas.spec.ts`).
#
# The visual tests `toHaveScreenshot('canvas-*.png')` need a committed
# baseline that matches the CI runner's rendering (Linux Chromium, with
# the runner's font stack + anti-aliasing settings). Local snapshots
# generated on Windows or macOS won't match — committing them produces
# false-positive failures on every CI run.
#
# This workflow is `workflow_dispatch`-triggered (manual button in the
# Actions tab). It:
#   1. Checks out the chosen branch + sets up pnpm / Node / Playwright.
#   2. Runs `pnpm exec playwright test --update-snapshots` against the
#      visual-canvas spec only — fastest path to a fresh baseline set.
#   3. Commits any resulting `.png` files back to the branch on a new
#      `chore/update-visual-snapshots` branch and opens a PR.
#
# Workflow: maintainer notices the visual baselines need refreshing
# (intentional canvas / theme / typography change), clicks "Run
# workflow" in the Actions tab, picks a branch (usually `main`),
# reviews the resulting PR, and merges it. The regular CI's e2e job
# then compares against the new baselines.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to refresh snapshots against (defaults to main).'
        required: false
        default: 'main'

jobs:
  refresh:
    name: Refresh visual snapshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Refresh baselines
        # `--update-snapshots` writes new PNGs to
        # `e2e/visual-canvas.spec.ts-snapshots/`. We pass the spec path
        # explicitly so the run is fast and we don't touch any other
        # accidental snapshot calls.
        #
        # The visual tests carry
        # `test.skip(!!process.env.CI && !process.env.REFRESH_VISUAL_SNAPSHOTS, …)`,
        # so this env var lets them actually run inside CI.
        env:
          REFRESH_VISUAL_SNAPSHOTS: '1'
        run: pnpm exec playwright test e2e/visual-canvas.spec.ts --update-snapshots

      - name: Commit + PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: refresh visual snapshot baselines'
          title: 'chore: refresh visual snapshot baselines'
          body: |
            Generated by the `Update visual snapshots` workflow.
            Review the diff before merging — every changed `.png`
            represents a difference between the old baseline and the
            new run. Merging accepts the new rendering as canonical.
          branch: chore/update-visual-snapshots
          delete-branch: true
          add-paths: |
            e2e/**/*.png
